services:
  postgres:
    image: postgres:15-alpine
    container_name: recallX_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: devcommands
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: